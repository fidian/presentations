## Carrying Information

Continuous wave (CW), aplitude modulation (AM), frequency modulation (FM), single sideband (SSB) transmission, and frequency hopping.

----

CW - sounds like a beep. No change in pitch. On/off.

AM - Higher amplitude = louder. Lower amplitude = quieter. No change in pitch.

FM - Higher frequency = higher pitch. Lower frequency = lower pitch. No change in amplitude.

----

<!-- .slide: data-background="cw-am-fm.webp" data-background-size="contain" -->

----

SSB - Like AM but only one sideband is transmitted. More efficient use of power and bandwidth.

----

<!-- .slide: data-background="am-vs-ssb.jpg" data-background-size="contain" -->

----

Frequency hopping - rapidly changing frequencies according to a pattern known to both transmitter and receiver. Used for secure communications and to make some communications more resistant to interference.

----

<!-- .slide: data-background="frequency-hopping.png" data-background-size="contain" -->

## Digital Radio

It's still sent over an analog medium (radio).

Bluetooth, Wi-Fi, and 5G are all digital radio standards.

----

Noise filtering and transmission efficiency is improved with digital modes.

When the signal degrades, the data rate can drop but the information can still be received without errors, up to a point. After that point, nothing is received.

When an analog signal degrades, it is consumed by static.

----

Different methods of encoding information improves the range by adding error correction or by lengthing the time to send a message.

The maximum data rate from a Wi-Fi radio system is much lower than a hard-wired or fiber-optic system, but the convenience of wireless communication makes it worth it for many applications.

## Option E - FRS & GMRS

What is FRS and GMRS?

How are they different from commercial two-way radios, CB, and HAM radio?

----

| Attribute | FRS   | GMRS          |
|-----------|-------|---------------|
| License   | No    | Yes (Family)  |
| Channels  | 22    | 22 (+8 sorta) |
| Power Max | 2 W   | 50 W          |
| Antenna   | Fixed | Detachable    |
| Range     | ~0.5 mi | ~5 mi          |

----

GMRS can use all FRS channels, plus 8 additional repeater channels.

FRS radios have a max power of 2 watts on some channels, and 0.5 watts on others.

----

FRS radios are for fun; hiking, camping, coordinating with family.

GMRS radios can be used for more off-roading, overlanding, large farm operations, contacting neighbors, and offer significantly more distance.
